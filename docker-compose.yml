services:
  backend:
    build: ./backend
    container_name: snake-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/snake_game.db
    volumes:
      - db-data:/app/data
    expose:
      - "8000"

  frontend:
    build: ./frontend
    container_name: snake-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db-data:
